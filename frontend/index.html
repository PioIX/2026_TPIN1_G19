<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div class="card">
        <h1>Iniciar sesión</h1>
        <form id="form-login">
            <label>Usuario</label>
            <input type="text" id="login-usuario" placeholder="Tu usuario">

            <label>Contraseña</label>
            <input type="password" id="login-contrasena" placeholder="Tu contraseña">

            <button type="submit">Ingresar</button>
        </form>
        <p id="mensaje-login" class="mensaje-form"></p>
        <p class="link-abajo">¿No tenés cuenta? <a href="registro.html">Registrate</a></p>
    </div>

    <script src="scripts/classes/Usuario.js"></script>
    <script src="scripts/logic.js"></script>
</body>
</html>
