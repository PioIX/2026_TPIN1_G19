<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registrarse</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
    <h1>Crear cuenta</h1>

    <form id="form-registro">
        <label>DNI</label>
        <input type="text" id="registro-dni">

        <label>Nombre completo</label>
        <input type="text" id="registro-nombre">

        <label>Usuario</label>
        <input type="text" id="registro-usuario">

        <label>Contraseña</label>
        <input type="password" id="registro-contrasena">

        <button type="submit">Crear cuenta</button>
    </form>

    <p id="mensaje-registro"></p>
    <p>¿Ya tenés cuenta? <a href="index.html">Iniciá sesión</a></p>

    <script src="scripts/classes/user.js"></script>
    <script src="scripts/logic.js"></script>
</body>

</html>
